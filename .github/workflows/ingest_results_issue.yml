name: Ingest Benchmark Result

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write

jobs:
  ingest:
    if: startsWith(github.event.issue.title, 'Benchmark result for xemu')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Extract and Validate JSON
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/process_issue.py

      - name: Commit New Result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw_results/
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-ingest result from Issue #${{ github.event.issue.number }}"
            git push
          fi

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --reason "completed"
          gh issue comment ${{ github.event.issue.number }} --body "Result successfully ingested. Closing issue."
