name: Build and Validate Source

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:

  build-python-module:
    name: Build source and wheel distributions
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Hatch
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc

      - name: Hatch fmt and type check
        run: |
          hatch fmt --check
          hatch run types:check

      - name: Build sdist and wheel
        run: |
          hatch build

  check-jinja-templates:
    name: Check Jinja2 templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Look for disallowed methods
        run: |
          if grep "console.log" src/xemu_perf_renderer/templates/*; then
            exit 1
          fi
          if grep "console.time" src/xemu_perf_renderer/templates/*; then
            exit 1
          fi

  check-javascript:
    name: Check JS files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Biome
        uses: biomejs/setup-biome@v2
        with:
          version: "latest"

      - name: Look for disallowed methods
        run: |
          if grep "console.log" src/xemu_perf_renderer/templates/*; then
            exit 1
          fi
          if grep "console.time" src/xemu_perf_renderer/templates/*; then
            exit 1
          fi

      - name: Run Biome CI check
        run: biome ci src/xemu_perf_renderer/templates
